<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freelance Rate Calculator — MoneyTools</title>
  <meta name="description" content="Calculate your freelance hourly rate based on income goals, taxes, expenses, and billable hours." />
  <link rel="stylesheet" href="../css/main.css" />
  <script src="../js/config.js"></script>
  <script src="../js/affiliate.js"></script>
</head>
<body>
  <header>
    <div class="container">
      <a class="logo" href="../index.html">MoneyTools</a>
      <nav><a href="../blog/index.html">Guides</a></nav>
    </div>
  </header>
  <main class="container tool-wrap">
    <h1>Freelance Rate Calculator</h1>
    <p class="lede">Most freelancers undercharge. This backs into the hourly rate you actually need.</p>

    <div class="panel">
      <div class="row">
        <div>
          <label>Target annual income (after tax) ($)</label>
          <input type="number" id="income" value="75000" min="0" />
        </div>
        <div>
          <label>Billable hours per week</label>
          <input type="number" id="hours" value="30" min="1" max="80" />
        </div>
      </div>
      <div class="row">
        <div>
          <label>Estimated tax rate (%)</label>
          <input type="number" id="tax" value="28" min="0" max="60" />
        </div>
        <div>
          <label>Annual business expenses ($)</label>
          <input type="number" id="expenses" value="4000" min="0" />
        </div>
      </div>
      <div class="row">
        <div>
          <label>Weeks off per year</label>
          <input type="number" id="weeks-off" value="4" min="0" max="20" />
        </div>
        <div>
          <label>Profit buffer (%)</label>
          <input type="number" id="profit" value="15" min="0" max="50" />
        </div>
      </div>
      <button type="button" id="calc">Calculate rate</button>
      <div class="result" id="result" hidden>
        <p>Minimum hourly rate:</p>
        <strong id="rate-out">$0</strong>
        <p id="detail" style="color:var(--muted);font-size:0.9rem;margin:8px 0 0"></p>
      </div>
    </div>

    <div class="affiliate-box" id="aff-invoicing"></div>
  </main>
  <footer class="container"><p>Free tool by MoneyTools.</p></footer>
  <script>
    function calc() {
      const income = +document.getElementById("income").value;
      const hours = +document.getElementById("hours").value;
      const tax = +document.getElementById("tax").value / 100;
      const expenses = +document.getElementById("expenses").value;
      const weeksOff = +document.getElementById("weeks-off").value;
      const profit = +document.getElementById("profit").value / 100;

      const weeks = 52 - weeksOff;
      const billableHours = hours * weeks;
      const preTax = income / (1 - tax);
      const withExpenses = preTax + expenses;
      const withProfit = withExpenses * (1 + profit);
      const rate = billableHours > 0 ? withProfit / billableHours : 0;

      document.getElementById("rate-out").textContent = "$" + rate.toFixed(2) + "/hr";
      document.getElementById("detail").textContent =
        `Based on ${billableHours} billable hours/year, ${(tax*100).toFixed(0)}% tax, $${expenses} expenses, ${(profit*100).toFixed(0)}% profit buffer.`;
      document.getElementById("result").hidden = false;
    }
    document.getElementById("calc").addEventListener("click", calc);
    calc();
    renderAffiliateBox("aff-invoicing", "invoicing",
      "Track invoices and expenses automatically",
      "If you are freelancing, invoicing software saves hours and gets you paid faster.",
      "Try FreshBooks");
  </script>
</body>
</html>
