name: Weekly SEO Content

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate blog articles and site config
        run: |
          python generate_seo.py
          python scripts/build-config.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/blog site/js/config.js
          if git diff --staged --quiet; then
            echo "No SEO changes"
          else
            git commit -m "chore: auto-refresh SEO articles"
            git push
          fi
